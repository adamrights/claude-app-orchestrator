name: vite-react-tailwind
description: Vite + React 18 SPA with TanStack Query, React Router, and Tailwind CSS.
type: spa

provides:
  framework: vite + react
  language: typescript
  styling: tailwind
  routing: react-router
  data-fetching: tanstack-query

dependencies:
  production:
    react: "^18.3.0"
    react-dom: "^18.3.0"
    "react-router-dom": "^6.26.0"
    "@tanstack/react-query": "^5.51.0"
    "@t3-oss/env-core": "^0.11.0"
    zod: "^3.23.0"
  dev:
    typescript: "^5.5.0"
    vite: "^5.4.0"
    "@vitejs/plugin-react": "^4.3.0"
    "@types/react": "^18.3.0"
    "@types/react-dom": "^18.3.0"
    tailwindcss: "^3.4.0"
    postcss: "^8.4.0"
    autoprefixer: "^10.4.0"
    vitest: "^2.0.0"
    jsdom: "^24.1.0"
    "@testing-library/react": "^16.0.0"
    "@testing-library/jest-dom": "^6.4.0"

post_scaffold:
  - npm install
