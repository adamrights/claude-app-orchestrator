# Skills referenced (verify these exist in agents/orchestrator.md's Skill
# Mapping table). Note: `rbac` is NOT a skill — it's a top-level blueprint
# section. The RBAC Specialist agent is dispatched automatically when the
# `rbac:` section is present; you do not list it as a feature skill.
